name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.25"]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}

      - name: Build
        run: go build $(go list ./... | grep -v '/plugins/')

      - name: Test
        run: go test $(go list ./... | grep -v '/plugins/') -v -race -count=1

      - name: Integration Test
        run: go test ./tests/integration/... -v -race -count=1 -tags integration

      - name: Vet
        run: go vet $(go list ./... | grep -v '/plugins/')

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.3
